<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="#E74C3C"/>
  
  <!-- 噪点纹理 -->
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <linearGradient id="cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5F0"/>
      <stop offset="100%" stop-color="#FFE4D6"/>
    </linearGradient>
    <linearGradient id="cone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4D03F"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
  </defs>
  
  <!-- 冰淇淋蛋筒 -->
  <path d="M35 55 L50 88 L65 55 Z" fill="url(#cone)"/>
  <path d="M35 55 L50 88 L65 55 Z" fill="none" stroke="#D68910" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- 蛋筒纹理 -->
  <line x1="42" y1="65" x2="58" y2="78" stroke="#D68910" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="65" x2="42" y2="78" stroke="#D68910" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="60" x2="45" y2="85" stroke="#D68910" stroke-width="1" opacity="0.3"/>
  <line x1="62" y1="60" x2="55" y2="85" stroke="#D68910" stroke-width="1" opacity="0.3"/>
  
  <!-- 冰淇淋球 - 底层 -->
  <circle cx="50" cy="48" r="18" fill="url(#cream)"/>
  
  <!-- 冰淇淋球 - 顶层 -->
  <circle cx="50" cy="35" r="15" fill="#FFB6C1"/>
  
  <!-- 爱心装饰 -->
  <path d="M50 28 C45 22, 38 25, 38 31 C38 37, 50 45, 50 45 C50 45, 62 37, 62 31 C62 25, 55 22, 50 28" fill="#FF6B9D"/>
  
  <!-- 高光 -->
  <ellipse cx="45" cy="30" rx="4" ry="3" fill="#FFF" opacity="0.6"/>
  <ellipse cx="46" cy="42" rx="5" ry="4" fill="#FFF" opacity="0.4"/>
  
  <!-- 小星星装饰 -->
  <path d="M72 35 L73 38 L76 38 L74 40 L75 43 L72 41 L69 43 L70 40 L68 38 L71 38 Z" fill="#FFD700"/>
  <path d="M28 38 L29 41 L32 41 L30 43 L31 46 L28 44 L25 46 L26 43 L24 41 L27 41 Z" fill="#FFD700"/>
  
  <!-- 日文装饰点 -->
  <circle cx="25" cy="55" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="75" cy="50" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="70" cy="65" r="1.5" fill="#FFF" opacity="0.6"/>
  
  <!-- 噪点覆盖 -->
  <rect x="0" y="0" width="100" height="100" fill="transparent" filter="url(#noise)" opacity="0.15"/>
</svg>